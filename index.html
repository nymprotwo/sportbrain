<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SportBrain</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <div id="fab-start"></div>
  <nav class="nav" id="nav">
    <button id="nav-workout" class="active" onclick="App.nav('workout')">
      <span class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 4v6M6 14v6M18 4v6M18 14v6M2 9h4M14 9h4M2 15h4M14 15h4M10 9v6"/>
        </svg>
      </span>
      <span class="label2">ТРЕНИРОВКА</span>
    </button>
    <button id="nav-home" onclick="App.nav('home')">
      <span class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </span>
      <span class="label2">ГЛАВНАЯ</span>
    </button>
    <button id="nav-programs" style="visibility:hidden;pointer-events:none"></button>
    <button id="nav-bio" onclick="App.nav('bio')">
      <span class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="7" y="2" width="10" height="5" rx="2"/>
          <path d="M12 7v4M8 11h8a2 2 0 012 2v1a4 4 0 01-4 4H10a4 4 0 01-4-4v-1a2 2 0 012-2z"/>
          <path d="M10 18v3M14 18v3"/>
        </svg>
      </span>
      <span class="label2">БИОХАКИНГ</span>
    </button>
  </nav>
  <div id="modal-root"></div>
</div>

<script src="js/storage.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<!-- Initialize Screens object before screen files -->
<script>const Screens = {};</script>
<script src="js/screens/home.js"></script>
<script src="js/screens/bio.js"></script>
<script src="js/screens/programs.js"></script>
<script src="js/screens/workout-browse.js"></script>
<script src="js/screens/workout-select.js"></script>
<script src="js/screens/workout-active.js"></script>
<script src="js/app.js"></script>
<script src="js/modals.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
